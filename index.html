<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VanhKhuc | Social Links</title>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@400;700&family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Magical Background Elements -->
    <div class="bg-gradient"></div>
    <div class="particles" id="particles"></div>
    <div class="glow-sphere s1"></div>
    <div class="glow-sphere s2"></div>

    <div class="app-wrapper">
        <main class="main-card glass">
            <!-- Decorative Sparkles -->
            <div class="decor-sparkle top-left"><i class="fa-solid fa-sparkles"></i></div>
            <div class="decor-sparkle bottom-right"><i class="fa-solid fa-star"></i></div>

            <!-- Profile Header -->
            <header class="header">
                <div class="avatar-container">
                    <div class="avatar-halo"></div>
                    <img src="assets/elaina.jpg" alt="VanhKhuc" class="avatar">
                </div>
                <h1 class="username">VanhKhuc</h1>
                <p class="description">Software Developer</p>
            </header>

            <!-- Links Section (Centered) -->
            <div class="content-centered">
                <h2 class="title"><i class="fa-solid fa-globe"></i> Connect with Me</h2>
                <div class="links-container">
                    <a href="https://github.com/BanhKhuc04" target="_blank" class="btn-link">
                        <i class="fa-brands fa-github"></i>
                        <span>GitHub</span>
                    </a>
                    <a href="https://www.tiktok.com/@vanhkhucdev" target="_blank" class="btn-link">
                        <i class="fa-brands fa-tiktok"></i>
                        <span>TikTok</span>
                    </a>
                    <a href="https://www.facebook.com/vanhkhuc2005" target="_blank" class="btn-link">
                        <i class="fa-brands fa-facebook-f"></i>
                        <span>Facebook</span>
                    </a>
                    <a href="mailto:vanhkhuc2k5@gmail.com" class="btn-link">
                        <i class="fa-solid fa-envelope"></i>
                        <span>Email</span>
                    </a>
                </div>
            </div>
        </main>
    </div>

    <!-- Magical Music Toggle -->
    <div class="music-ui">
        <button id="magic-music" class="magic-btn">
            <i class="fa-solid fa-music"></i>
            <span class="magic-glow"></span>
        </button>
    </div>

    <script src="script.js"></script>
</body>
</html>
